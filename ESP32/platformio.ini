; https://docs.platformio.org/page/projectconf.html

[env:ttgo-t7-v14-mini32]
; Pinned on purpose — do NOT float to the latest espressif32.
; espressif32 7.0.0 pulls framework-espidf 6.0.0, whose bundled `mqtt`
; (esp-mqtt) and `json` (cJSON) components ship without sources, so the build
; fails at CMake config with "Failed to resolve component 'mqtt'". 6.9.0
; (ESP-IDF 5.3) bundles both correctly. See README "Build & flash".
platform = espressif32@6.9.0
board = ttgo-t7-v14-mini32
framework = espidf
monitor_speed = 115200
